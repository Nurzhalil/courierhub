<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courier Form - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title mb-0" th:text="${courier.id != null ? 'Edit Courier' : 'New Courier'}"></h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${courier.id != null ? '/admin/couriers/' + courier.id : '/admin/couriers'}"
                              method="POST" th:object="${courier}">
                            
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="tel" class="form-control" id="phone" th:field="*{phone}" required
                                       pattern="^\+?[0-9]{10,15}$" title="Please enter a valid phone number">
                            </div>

                            <div class="mb-3">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" class="form-control" id="address" th:field="*{address}" required>
                            </div>

                            <div class="mb-3">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city" th:field="*{city}" required>
                            </div>

                            <div class="mb-3">
                                <label for="birthDate" class="form-label">Birth Date</label>
                                <input type="date" class="form-control" id="birthDate" th:field="*{birthDate}" required>
                            </div>

                            <div class="mb-3">
                                <label for="passportNumber" class="form-label">Passport Number</label>
                                <input type="text" class="form-control" id="passportNumber" th:field="*{passportNumber}" required>
                            </div>

                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" th:field="*{username}" required
                                       pattern="^[a-zA-Z0-9_]{3,20}$" 
                                       title="Username must be 3-20 characters long and can contain letters, numbers, and underscores">
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" 
                                       th:required="${courier.id == null}"
                                       pattern="^.{6,}$" 
                                       title="Password must be at least 6 characters long">
                                <small class="text-muted" th:if="${courier.id != null}">
                                    Leave blank to keep current password
                                </small>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/admin/couriers" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Save Courier</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
